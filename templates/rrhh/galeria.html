<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Galería de Fotos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            background-color: #f4f6f9;
        }

        .navbar-custom {
            background: #0f172a;
        }

        .carousel-item img {
            height: 500px;
            object-fit: cover;
            border-radius: 16px;
        }

        .info-box {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="#">Mi Galería</a>
            <div class="ms-auto">
                <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Cerrar sesión</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h1 class="text-center mb-4">Galería de Fotos</h1>

        {% if fotos %}
            <div id="carouselGaleria" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-indicators">
                    {% for foto in fotos %}
                        <button type="button"
                                data-bs-target="#carouselGaleria"
                                data-bs-slide-to="{{ forloop.counter0 }}"
                                class="{% if forloop.first %}active{% endif %}"
                                {% if forloop.first %}aria-current="true"{% endif %}
                                aria-label="Slide {{ forloop.counter }}">
                        </button>
                    {% endfor %}
                </div>

                <div class="carousel-inner">
                    {% for foto in fotos %}
                        <div class="carousel-item {% if forloop.first %}active{% endif %}">
                            <img src="{{ foto.imagen.url }}" class="d-block w-100" alt="{{ foto.titulo }}">
                            <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded p-3">
                                <h5>{{ foto.titulo }}</h5>
                                <p>{{ foto.descripcion }}</p>
                            </div>
                        </div>
                    {% endfor %}
                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#carouselGaleria" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                    <span class="visually-hidden">Anterior</span>
                </button>

                <button class="carousel-control-next" type="button" data-bs-target="#carouselGaleria" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                    <span class="visually-hidden">Siguiente</span>
                </button>
            </div>

            <div class="alert alert-light text-center">
                <strong>Total de fotos: {{ total_fotos }}</strong>
            </div>
        {% else %}
            <div class="alert alert-warning text-center">
                No hay fotos cargadas todavía.
            </div>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
